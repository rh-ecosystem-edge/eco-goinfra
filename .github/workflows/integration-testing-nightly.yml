name: Integration Testing (Nightly)

on:
  workflow_dispatch:
  # Triggers the workflow every day
  schedule:
    - cron: "0 0 * * *"

jobs:
  integration-k8s:
    if: github.repository_owner == 'rh-ecosystem-edge'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    env:
      SHELL: /bin/bash
      KUBECONFIG: '/home/runner/.kube/config'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup cluster (k8s)
        uses: palmsoftware/quick-k8s@754cca3fa5cb582dae64715a7ca29ee4dc9f413f # v1.0.0
        with:
          waitForPodsReady: true

      - name: Run integration tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 90
          max_attempts: 3
          command: make integration-test

  integration-ocp:
    if: github.repository_owner == 'rh-ecosystem-edge'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
    env:
      SHELL: /bin/bash
      KUBECONFIG: '/home/runner/.kube/config'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup cluster (ocp)
        uses: palmsoftware/quick-ocp@750f1c774eac0d563504fa63f3c70571bacb54b4 # v0.0.37
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          bundleCache: true
        env:
          OCP_PULL_SECRET: ${{ secrets.OCP_PULL_SECRET }}

      - name: Run integration tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 90
          max_attempts: 3
          command: make integration-test
